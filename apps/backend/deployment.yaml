apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/ethanreedt/animal-wiki-taxonomy-explorer-backend:latest@sha256:7e69633ce34a35efef684488f3aedf5d8a74387d07720a438cba283fe34dc9b9 # {"$imagepolicy": "flux-system:backend"}
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: db-auth
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
