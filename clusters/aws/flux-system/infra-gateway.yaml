apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-gateway
  namespace: traefik
spec:
  interval: 5m
  path: ../../../infrastructure/gateway
  prune: true
  wait: true
  dependsOn:
    - name: infra-traefik
  sourceRef:
    kind: GitRepository
    name: flux-system