apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1m0s
  releaseName: traefik
  targetNamespace: traefik
  install:
    createNamespace: true

  chart:
    spec:
      chart: traefik
      version: "38.0.2"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system

  providers:
    kubernetesGateway:
      enabled: true